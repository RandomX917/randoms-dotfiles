# ~/.config/hypr/hyprlock.conf

general {
    disable_loading_bar = false
    grace = 3
    hide_cursor = true
}

background {
    monitor =
    path = ~/.config/hypr/wallpapers/lock.png
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 1.1
    brightness = 0.9
    vibrancy = 0.2
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255,255,255,1.0)
    font_size = 90
    font_family = JetBrains Mono
    position = 0, 120
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(200,200,200,0.8)
    font_size = 24
    font_family = JetBrains Mono
    position = 0, 40
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.3
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(255,255,255,0.3)
    inner_color = rgba(0,0,0,0.3)
    font_color = rgba(255,255,255,1.0)
    fade_on_empty = false
    placeholder_text = <i>Enter Password...</i>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}
